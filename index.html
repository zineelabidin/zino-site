<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban Timber | L'Excellence du Bois</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #121212; --accent: #b08968; --bg: #ffffff; --light: #f8f8f8; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: #333; line-height: 1.6; }
    nav { position: fixed; width: 100%; padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; text-transform: uppercase; }
    .logo span { color: var(--accent); }
    nav ul { display: flex; gap: 30px; list-style: none; }
    nav a { text-decoration: none; color: var(--primary); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
    .hero { height: 80vh; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1611269154421-4e27233ac5c7?q=80&w=1920') center/cover; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
    section { padding: 80px 10%; }
    h2 { font-family: 'Playfair Display', serif; font-size: 36px; text-align: center; margin-bottom: 50px; }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .gallery-item { background: var(--light); height: 400px; overflow: hidden; position: relative; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; opacity: 0; }
    .gallery-item img.loaded { opacity: 1; }
    .upload-box { max-width: 500px; margin: 0 auto; padding: 40px; background: white; border: 1px solid #eee; }
    input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; outline: none; }
    .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; cursor: pointer; text-transform: uppercase; font-weight: 600; }
    .wa { position: fixed; bottom: 30px; right: 30px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 24px; z-index: 1000; }
  </style>
</head>
<body>
  <nav><div class="logo">Urban <span>Timber</span></div><ul><li><a href="#">Accueil</a></li><li><a href="#gallery">Projets</a></li></ul></nav>
  <header class="hero"><div><h1>L'Art du Bois</h1><p>Design & Tradition</p></div></header>
  <section id="gallery"><h2>Nos Réalisations</h2><div class="gallery-grid" id="galleryGrid"></div></section>
  <section id="upload"><div class="upload-box"><h2>Nouveau Projet</h2><form id="uForm"><input type="text" id="pName" placeholder="Nom" required><input type="url" id="pUrl" placeholder="URL Image" required><button type="submit" class="btn">Envoyer</button></form></div></section>
  <a href="https://wa.me/212666970681" class="wa" target="_blank">💬</a>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCLmeMTvTFck1NCpdqdI5H8fLc8HIPup1U",
      authDomain: "urbantimber-ebcec.firebaseapp.com",
      projectId: "urbantimber-ebcec",
      storageBucket: "urbantimber-ebcec.firebasestorage.app",
      appId: "1:586135452772:web:81166e289ad37fa8a5f371"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const initialImages = [
      { url: "https://images.unsplash.com/photo-1556912177-466f98ce89ae?q=80", tag: "Cuisine" },
      { url: "https://images.unsplash.com/photo-1510798831971-661eb04b3739?q=80", tag: "Bureau" },
      { url: "https://images.unsplash.com/photo-1595428774223-ef52624120d2?q=80", tag: "Chambre" }
    ];

    function loadGallery() {
      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = "";
      initialImages.forEach(img => addImg(img.url));
      db.collection("projets").where("status", "==", "approved").onSnapshot(snap => {
        snap.forEach(doc => addImg(doc.data().imageUrl));
      });
    }

    function addImg(url) {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      const img = document.createElement('img');
      img.src = url;
      img.onload = () => img.classList.add('loaded');
      img.onerror = () => item.remove();
      item.appendChild(img);
      document.getElementById('galleryGrid').appendChild(item);
    }

    document.getElementById('uForm').onsubmit = async (e) => {
      e.preventDefault();
      try {
        await db.collection("projets").add({
          userName: document.getElementById('pName').value,
          imageUrl: document.getElementById('pUrl').value,
          status: "pending",
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("Succès !");
        e.target.reset();
      } catch (err) { alert(err.message); }
    };

    window.onload = loadGallery;
  </script>
</body>
</html>
