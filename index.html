<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban Timber | Portfolio Menuiserie</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #121212; --accent: #b08968; --bg: #ffffff; --light: #f8f8f8; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color:#333; scroll-behavior: smooth; }
    
    /* NAV UPDATED */
    nav { position: fixed; width:100%; padding:15px 5%; display:flex; justify-content:space-between; align-items:center; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index:1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .logo { font-family:'Playfair Display'; font-size:20px; font-weight:700; text-transform: uppercase; }
    .logo span { color: var(--accent); }
    nav ul { display:flex; gap:20px; list-style:none; }
    nav a { text-decoration:none; color: var(--primary); font-size:10px; text-transform:uppercase; letter-spacing: 1.5px; font-weight: 600; transition: 0.3s; }
    nav a:hover { color: var(--accent); }

    /* HERO */
    .hero { height:60vh; background: linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1611269154421-4e27233ac5c7?q=80&w=1920') center/cover; display:flex; align-items:center; justify-content:center; color:white; text-align:center; }
    .hero h1 { font-family: 'Playfair Display'; font-size: clamp(35px, 5vw, 55px); }

    /* SECTIONS */
    section { padding:60px 8%; }
    h2 { text-align:center; margin-bottom:40px; font-family:'Playfair Display'; font-size: 30px; }
    .gallery-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .gallery-item { background:var(--light); height:400px; overflow:hidden; position: relative; opacity:0; transform:translateY(20px); animation:fadeUp 0.6s forwards; }
    .gallery-item img { width:100%; height:100%; object-fit:cover; transition: 0.8s; }
    .gallery-item:hover img { transform:scale(1.1); }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    /* FORM */
    .upload-box { max-width:500px; margin:0 auto; padding:40px; background:white; border: 1px solid #eee; }
    input { width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; }
    .btn { width:100%; padding:15px; background:var(--primary); color:white; border:none; cursor:pointer; text-transform: uppercase; font-weight: 600; }
    .btn:hover { background: var(--accent); }

    .wa { position:fixed; bottom:30px; right:30px; background:#25D366; color:white; width:55px; height:55px; border-radius:50%; display:flex; align-items:center; justify-content:center; text-decoration:none; font-size:22px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 1000; }
    footer { padding: 30px; text-align: center; background: var(--primary); color: #777; font-size: 11px; }

    @media (max-width: 900px) {
      nav ul { display: none; } /* Hide menu on small mobile or use a burger menu */
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">Urban <span>Timber</span></div>
  <ul>
    <li><a href="index.html">Accueil</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="forum.html">Forum / منتدى</a></li>
    <li><a href="#gallery">Collection</a></li>
    <li><a href="zino-admin.html">Admin</a></li>
  </ul>
</nav>

<header class="hero">
  <div>
    <h1>L'Artisanat d'Excellence</h1>
    <p style="letter-spacing: 2px; text-transform: uppercase; font-size: 10px; margin-top: 10px;">Menuiserie Moderne à Salé</p>
  </div>
</header>

<section id="gallery">
  <h2>Nos Réalisations</h2>
  <div class="gallery-grid" id="galleryGrid"></div>
</section>

<section id="upload" style="background: var(--light);">
  <div class="upload-box">
    <h2>Nouveau Projet</h2>
    <form id="uForm">
      <input type="text" id="pName" placeholder="Votre Nom" required>
      <input type="url" id="pUrl" placeholder="Lien de l'image (URL)" required>
      <button type="submit" class="btn">Envoyer</button>
    </form>
  </div>
</section>

<footer>&copy; 2026 URBAN TIMBER | ZINO. ALL RIGHTS RESERVED.</footer>

<a href="https://wa.me/212666970681" class="wa" target="_blank">💬</a>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCLmeMTvTFck1NCpdqdI5H8fLc8HIPup1U",
  authDomain: "urbantimber-ebcec.firebaseapp.com",
  projectId: "urbantimber-ebcec",
  storageBucket: "urbantimber-ebcec.firebasestorage.app",
  appId: "1:586135452772:web:81166e289ad37fa8a5f371"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// روابط صور جديدة وموثوقة لإنهاء مشكلة الصور المكسورة
const initialImages = [
  "https://images.unsplash.com/photo-1556912177-466f98ce89ae?q=80&w=600",
  "https://images.unsplash.com/photo-1510798831971-661eb04b3739?q=80&w=600",
  "https://images.unsplash.com/photo-1595428774223-ef52624120d2?q=80&w=600",
  "https://images.unsplash.com/photo-1600585154526-990dced4db0d?q=80&w=600"
];

function loadGallery() {
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = "";
  initialImages.forEach(url => addImg(url));

  db.collection("projets").where("status", "==", "approved").onSnapshot(snapshot => {
    snapshot.forEach(doc => {
      const url = doc.data().imageUrl;
      if (!initialImages.includes(url)) { addImg(url); }
    });
  });
}

function addImg(url) {
  const item = document.createElement('div');
  item.className = "gallery-item";
  const img = document.createElement('img');
  img.src = url;
  img.onerror = () => item.remove();
  item.appendChild(img);
  document.getElementById('galleryGrid').appendChild(item);
}

document.getElementById('uForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.innerText = "Envoi...";
  btn.disabled = true;
  try {
    await db.collection("projets").add({
      userName: document.getElementById('pName').value,
      imageUrl: document.getElementById('pUrl').value,
      status: "pending",
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    alert("Projet envoyé ! Merci ZINO.");
    e.target.reset();
  } catch(err) { alert(err.message); }
  btn.innerText = "Envoyer";
  btn.disabled = false;
};

window.onload = loadGallery;
</script>
</body>
</html>
