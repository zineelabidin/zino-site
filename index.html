<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban Timber | L'Art de la Menuiserie Fine</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #121212;
      --accent: #b08968;
      --bg: #ffffff;
      --text: #333;
      --light-gray: #f9f9f9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    
    body { 
      font-family: 'Inter', sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      line-height: 1.7;
    }

    /* --- Navigation --- */
    nav {
      position: fixed; width: 100%; padding: 20px 8%;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
      z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; letter-spacing: 1px; }
    .logo span { color: var(--accent); }
    nav ul { display: flex; gap: 30px; list-style: none; }
    nav a { text-decoration: none; color: var(--primary); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; }
    nav a:hover { color: var(--accent); }

    /* --- Hero Section --- */
    .hero {
      height: 90vh;
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                  url('https://images.unsplash.com/photo-1611269154421-4e27233ac5c7?auto=format&fit=crop&w=1920&q=80') center/cover;
      display: flex; align-items: center; justify-content: center; text-align: center; color: white;
    }
    .hero-content h1 { font-family: 'Playfair Display', serif; font-size: clamp(40px, 6vw, 75px); margin-bottom: 15px; }
    .hero-content p { font-size: 14px; text-transform: uppercase; letter-spacing: 4px; opacity: 0.9; }

    /* --- Gallery Section --- */
    section { padding: 120px 10%; }
    .section-title { text-align: center; margin-bottom: 70px; }
    .section-title h2 { font-family: 'Playfair Display', serif; font-size: 40px; margin-bottom: 15px; }
    .section-title p { color: #888; font-weight: 300; }

    .gallery-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
      gap: 25px; 
    }
    
    .gallery-item { 
      background: var(--light-gray); 
      overflow: hidden; 
      height: 450px;
      position: relative;
      border-radius: 2px;
    }
    
    .gallery-item img { 
      width: 100%; height: 100%; object-fit: cover; 
      transition: 1s cubic-bezier(0.2, 1, 0.3, 1);
      opacity: 0; /* مخفية حتى يتم التحميل بنجاح */
    }
    
    /* الفئة التي تُضاف عند نجاح التحميل */
    .gallery-item img.loaded { opacity: 1; transform: scale(1.05); }
    .gallery-item:hover img.loaded { transform: scale(1.15); filter: brightness(0.9); }

    /* --- Upload Form --- */
    .upload-section { background: var(--light-gray); }
    .upload-box { 
      max-width: 550px; margin: 0 auto; 
      padding: 60px; background: #fff; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.03);
    }
    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #999; margin-bottom: 10px; font-weight: 600; }
    .form-group input { 
      width: 100%; padding: 18px; border: 1px solid #eee; 
      outline: none; font-family: inherit; transition: 0.3s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .btn-send { 
      width: 100%; padding: 20px; background: var(--primary); color: white; 
      border: none; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; cursor: pointer; transition: 0.3s;
    }
    .btn-send:hover { background: var(--accent); }

    /* --- WhatsApp Float --- */
    .wa-float { 
      position: fixed; bottom: 40px; right: 40px; 
      background: #25D366; color: white; 
      width: 65px; height: 65px; border-radius: 50%; 
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: 28px; z-index: 1000;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: 0.3s;
    }
    .wa-float:hover { transform: scale(1.1) translateY(-5px); }

    footer { padding: 60px; text-align: center; background: var(--primary); color: rgba(255,255,255,0.4); font-size: 11px; letter-spacing: 2px; }

    @media (max-width: 768px) {
      nav { flex-direction: column; gap: 15px; padding: 20px; }
      section { padding: 80px 5%; }
      .gallery-item { height: 350px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">URBAN <span>TIMBER</span></div>
    <ul>
      <li><a href="#">Accueil</a></li>
      <li><a href="#gallery">Collection</a></li>
      <li><a href="#upload">Partage</a></li>
    </ul>
  </nav>

  <header class="hero">
    <div class="hero-content">
      <p>Artisanat & Modernité</p>
      <h1>L'Essence du Bois</h1>
      <a href="#gallery" style="text-decoration:none; color:white; border: 1px solid white; padding: 12px 35px; font-size: 11px; text-transform:uppercase; letter-spacing: 2px;">Voir les oeuvres</a>
    </div>
  </header>

  <section id="gallery">
    <div class="section-title">
      <h2>Nos Réalisations</h2>
      <p>Découvrez notre savoir-faire à travers ces créations uniques.</p>
    </div>
    <div class="gallery-grid" id="galleryGrid">
      </div>
  </section>

  <section id="upload" class="upload-section">
    <div class="upload-box">
      <div class="section-title" style="margin-bottom: 40px;">
        <h2 style="font-size: 28px;">Partagez un Projet</h2>
      </div>
      <form id="uploadForm">
        <div class="form-group">
          <label>Votre Nom</label>
          <input type="text" id="userName" placeholder="EX: ZINO" required>
        </div>
        <div class="form-group">
          <label>Lien de l'image (URL)</label>
          <input type="url" id="imgUrl" placeholder="https://..." required>
        </div>
        <button type="submit" id="submitBtn" class="btn-send">Envoyer pour Validation</button>
      </form>
    </div>
  </section>

  <footer>
    &copy; 2026 URBAN TIMBER. TOUS DROITS RÉSERVÉS.
  </footer>

  <a href="https://wa.me/212666970681" class="wa-float" target="_blank">💬</a>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCLmeMTvTFck1NCpdqdI5H8fLc8HIPup1U",
      authDomain: "urbantimber-ebcec.firebaseapp.com",
      projectId: "urbantimber-ebcec",
      storageBucket: "urbantimber-ebcec.firebasestorage.app",
      appId: "1:586135452772:web:81166e289ad37fa8a5f371"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // إرسال البيانات إلى Firebase
    document.getElementById('uploadForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.innerText = "ENVOI EN COURS...";
      btn.disabled = true;
      
      try {
        await db.collection("projets").add({
          userName: document.getElementById('userName').value,
          imageUrl: document.getElementById('imgUrl').value,
          status: "pending",
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("Merci ZINO ! Votre projet a été reçu.");
        e.target.reset();
      } catch (err) { alert("Erreur: " + err.message); }
      
      btn.innerText = "Envoyer pour Validation";
      btn.disabled = false;
    };

    // عرض الصور مع ميزة التنظيف التلقائي للصور المكسورة
    db.collection("projets").where("status", "==", "approved")
      .onSnapshot(snap => {
        const gallery = document.getElementById('galleryGrid');
        gallery.innerHTML = "";

        snap.forEach(doc => {
          const data = doc.data();
          if (data.imageUrl) {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            
            const img = document.createElement('img');
            img.src = data.imageUrl;
            
            // في حال نجاح التحميل تظهر الصورة بسلاسة
            img.onload = function() {
              this.classList.add('loaded');
            };
            
            // في حال فشل التحميل (رابط مكسور) يتم حذف المربع بالكامل
            img.onerror = function() {
              item.remove();
            };

            item.appendChild(img);
            gallery.appendChild(item);
          }
        });
      }, err => {
        console.error("Gallery Error:", err);
      });
  </script>
</body>
</html>
