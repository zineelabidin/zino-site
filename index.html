<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban Timber | Portfolio Menuiserie</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #121212;
      --accent: #b08968;
      --bg: #ffffff;
      --light: #f8f8f8;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color:#333; scroll-behavior: smooth; }
    
    /* NAV */
    nav { position: fixed; width:100%; padding:20px 8%; display:flex; justify-content:space-between; align-items:center; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index:1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .logo { font-family:'Playfair Display'; font-size:22px; font-weight:700; text-transform: uppercase; }
    .logo span { color: var(--accent); }
    nav ul { display:flex; gap:30px; list-style:none; }
    nav a { text-decoration:none; color: var(--primary); font-size:11px; text-transform:uppercase; letter-spacing: 2px; font-weight: 600; }

    /* HERO */
    .hero { height:70vh; background: linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1611269154421-4e27233ac5c7?q=80&w=1920') center/cover; display:flex; align-items:center; justify-content:center; color:white; text-align:center; }
    .hero h1 { font-family: 'Playfair Display'; font-size: clamp(40px, 5vw, 60px); }

    /* GALLERY */
    section { padding:80px 8%; }
    h2 { text-align:center; margin-bottom:50px; font-family:'Playfair Display'; font-size: 32px; }
    
    .gallery-grid { 
      display:grid; 
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
      gap: 25px; 
    }
    
    .gallery-item { 
      background:var(--light); 
      height:450px; 
      overflow:hidden; 
      position: relative;
      opacity:0; 
      transform:translateY(20px); 
      animation:fadeUp 0.6s forwards;
    }
    
    .gallery-item img { 
      width:100%; 
      height:100%; 
      object-fit:cover; 
      transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1); 
    }
    
    .gallery-item:hover img { transform:scale(1.1); filter: brightness(0.9); }

    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    /* UPLOAD BOX */
    .upload-box { max-width:550px; margin:0 auto; padding:50px; background:white; border: 1px solid #eee; }
    input { width:100%; padding:15px; margin:10px 0; border:1px solid #ddd; font-family: inherit; }
    .btn { width:100%; padding:18px; background:var(--primary); color:white; border:none; cursor:pointer; text-transform: uppercase; font-weight: 600; transition: 0.3s; }
    .btn:hover { background: var(--accent); }

    /* WHATSAPP */
    .wa { position:fixed; bottom:30px; right:30px; background:#25D366; color:white; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; text-decoration:none; font-size:24px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 1000; }

    footer { padding: 40px; text-align: center; background: var(--primary); color: #777; font-size: 12px; letter-spacing: 1px; }

    @media (max-width: 768px) {
      nav { flex-direction: column; gap: 10px; }
      .gallery-item { height: 350px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">Urban <span>Timber</span></div>
  <ul>
    <li><a href="#">Accueil</a></li>
    <li><a href="#gallery">Collection</a></li>
    <li><a href="#upload">Contact</a></li>
  </ul>
</nav>

<header class="hero">
  <div>
    <h1>Portfolio d'Excellence</h1>
    <p style="letter-spacing: 3px; text-transform: uppercase; font-size: 11px; margin-top: 10px;">L'artisanat du bois à Salé</p>
  </div>
</header>

<section id="gallery">
  <h2>Nos Réalisations</h2>
  <div class="gallery-grid" id="galleryGrid">
    </div>
</section>

<section id="upload" style="background: var(--light);">
  <div class="upload-box">
    <h2 style="font-size: 24px; margin-bottom: 20px;">Nouveau Projet</h2>
    <form id="uForm">
      <input type="text" id="pName" placeholder="Votre Nom" required>
      <input type="url" id="pUrl" placeholder="URL de l'image" required>
      <button type="submit" class="btn">Envoyer pour validation</button>
    </form>
  </div>
</section>

<footer>&copy; 2026 URBAN TIMBER. TOUS DROITS RÉSERVÉS.</footer>

<a href="https://wa.me/212666970681" class="wa" target="_blank">💬</a>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCLmeMTvTFck1NCpdqdI5H8fLc8HIPup1U",
  authDomain: "urbantimber-ebcec.firebaseapp.com",
  projectId: "urbantimber-ebcec",
  storageBucket: "urbantimber-ebcec.firebasestorage.app",
  appId: "1:586135452772:web:81166e289ad37fa8a5f371"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// القائمة المحدثة بـ 15 صورة فخمة (مطبخ، مكتب، غرف نوم، صالونات)
const initialImages = [
  "https://images.unsplash.com/photo-1556912177-466f98ce89ae?q=80&w=800", // Cuisine 1
  "https://images.unsplash.com/photo-1510798831971-661eb04b3739?q=80&w=800", // Bureau 1
  "https://images.unsplash.com/photo-1595428774223-ef52624120d2?q=80&w=800", // Chambre 1
  "https://images.unsplash.com/photo-1600585154526-990dced4db0d?q=80&w=800", // Cuisine 2
  "https://images.unsplash.com/photo-1507089947368-19c1da9775ae?q=80&w=800", // Salon Wood
  "https://images.unsplash.com/photo-1620626011761-996317b8d101?q=80&w=800", // Dressing
  "https://images.unsplash.com/photo-1533090161767-e6ffed986c88?q=80&w=800", // Bureau 2
  "https://images.unsplash.com/photo-1599619351208-3e6c839d7824?q=80&w=800", // Table 1
  "https://images.unsplash.com/photo-1544457070-4cd773b4d71e?q=80&w=800", // Meuble TV
  "https://images.unsplash.com/photo-1565410329381-891481e3217d?q=80&w=800", // Wood detail
  "https://images.unsplash.com/photo-1505691938895-1758d7eaa511?q=80&w=800", // Chambre 2
  "https://images.unsplash.com/photo-1615873968403-89e068629275?q=80&w=800", // Cuisine 3
  "https://images.unsplash.com/photo-1592595820246-fe01dfadad7f?q=80&w=800", // Shelf
  "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=800", // Modern Kitchen
  "https://images.unsplash.com/photo-1517705008128-361805f42e86?q=80&w=800"  // Work desk
];

function loadGallery() {
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = "";

  // 1. عرض الـ 15 صورة الأساسية
  initialImages.forEach(url => addImg(url));

  // 2. عرض الصور المعتمدة من Firebase
  db.collection("projets")
    .where("status", "==", "approved")
    .onSnapshot(snapshot => {
      snapshot.forEach(doc => {
        const url = doc.data().imageUrl;
        // نتحقق لمنع تكرار الصور الموجودة أصلاً
        if (!initialImages.includes(url)) {
            addImg(url);
        }
      });
    });
}

function addImg(url) {
  const item = document.createElement('div');
  item.className = "gallery-item";
  const img = document.createElement('img');
  img.src = url;
  
  // إذا حدث خطأ في رابط معين، يتم حذف المربع ليبقى الموقع احترافياً
  img.onerror = () => item.remove();
  
  item.appendChild(img);
  document.getElementById('galleryGrid').appendChild(item);
}

// Upload Function
document.getElementById('uForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.innerText = "Envoi...";
  btn.disabled = true;

  try {
    await db.collection("projets").add({
      userName: document.getElementById('pName').value,
      imageUrl: document.getElementById('pUrl').value,
      status: "pending",
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    alert("Projet envoyé ! Merci ZINO.");
    e.target.reset();
  } catch(err) { alert(err.message); }
  
  btn.innerText = "Envoyer لـ Validation";
  btn.disabled = false;
};

window.onload = loadGallery;
</script>
</body>
</html>
