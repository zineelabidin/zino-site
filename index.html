<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban Timber | L'Excellence du Bois</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #121212;
      --accent: #b08968;
      --bg: #ffffff;
      --text: #333;
      --light-gray: #f8f8f8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    
    body { 
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
      line-height: 1.8; -webkit-font-smoothing: antialiased;
    }

    /* Navigation */
    nav {
      position: fixed; width: 100%; padding: 20px 8%;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
      z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; letter-spacing: 1px; color: var(--primary); text-transform: uppercase; }
    .logo span { color: var(--accent); font-style: italic; font-weight: 400; text-transform: lowercase; }

    nav ul { display: flex; gap: 35px; list-style: none; }
    nav a { text-decoration: none; color: var(--primary); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
    nav a:hover { color: var(--accent); }

    /* Hero Section */
    .hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                  url('https://images.unsplash.com/photo-1611269154421-4e27233ac5c7?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
      display: flex; align-items: center; justify-content: center; text-align: center; color: #fff;
    }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(45px, 7vw, 85px); line-height: 1.1; margin-bottom: 20px; }
    .hero p { font-size: 14px; text-transform: uppercase; letter-spacing: 5px; font-weight: 300; }

    /* Section Styling */
    section { padding: 100px 8%; }
    .section-header { text-align: center; margin-bottom: 80px; }
    .section-header h2 { font-family: 'Playfair Display', serif; font-size: 42px; color: var(--primary); margin-bottom: 15px; }
    .section-header p { font-size: 16px; color: #777; font-weight: 300; }

    /* Gallery Grid */
    .gallery-grid { 
      display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; 
    }
    .gallery-item { 
      background: var(--light-gray); border-radius: 4px; overflow: hidden; position: relative; height: 450px;
    }
    .gallery-item img { 
      width: 100%; height: 100%; object-fit: cover; transition: 1.2s cubic-bezier(0.2, 1, 0.3, 1); opacity: 0;
    }
    .gallery-item img.loaded { opacity: 1; }
    .gallery-item:hover img.loaded { transform: scale(1.1); filter: brightness(0.85); }

    /* Label overlay */
    .img-tag {
        position: absolute; bottom: 20px; left: 20px; background: rgba(255,255,255,0.9);
