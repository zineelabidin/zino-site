<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Urban Timber</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 10px; border-radius: 8px; text-align: center; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        .btn-ok { background: #28a745; color: white; border: none; padding: 5px 10px; cursor: pointer; margin: 5px; }
        .btn-no { background: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>Projets en attente de validation</h1>
    <div id="list" class="grid">Chargement...</div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLmeMTvTFck1NCpdqdI5H8fLc8HIPup1U",
            authDomain: "urbantimber-ebcec.firebaseapp.com",
            projectId: "urbantimber-ebcec",
            appId: "1:586135452772:web:81166e289ad37fa8a5f371"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("projets").where("status", "==", "pending").onSnapshot(snap => {
            const list = document.getElementById('list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="card">
                        <img src="${data.imageUrl}">
                        <p>${data.userName}</p>
                        <button class="btn-ok" onclick="updateStatus('${doc.id}', 'approved')">Approuver</button>
                        <button class="btn-no" onclick="updateStatus('${doc.id}', 'rejected')">Supprimer</button>
                    </div>
                `;
            });
        });

        async function updateStatus(id, status) {
            await db.collection("projets").doc(id).update({ status: status });
            alert("Action effectuée !");
        }
    </script>
</body>
</html>
